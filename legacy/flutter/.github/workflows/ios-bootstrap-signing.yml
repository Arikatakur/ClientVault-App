name: Bootstrap iOS signing (run once)

# Run this ONCE (Actions tab -> "Bootstrap iOS signing" -> Run workflow) after the
# GitHub secrets and the empty private certs repo (MATCH_GIT_URL) are in place.
# It generates your Apple distribution certificate + App Store provisioning profile
# and stores them, encrypted, in the certs repo. The release workflow then runs
# match in read-only mode. Re-run only if certs/profiles change.
on:
  workflow_dispatch:

jobs:
  bootstrap:
    name: Generate & store signing assets
    runs-on: macos-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Decode App Store Connect API key
        run: |
          mkdir -p ios/fastlane
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | openssl base64 -d -A > ios/fastlane/AuthKey.p8

      - name: Generate & store signing assets (match read-write)
        working-directory: ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane bootstrap_signing
