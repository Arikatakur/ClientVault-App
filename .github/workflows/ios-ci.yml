name: iOS CI

# Generates the Xcode project from project.yml (XcodeGen), then builds and runs
# the unit tests on an iOS Simulator. No signing needed for simulator tests.
# This is the first place the SwiftUI scaffold is actually compiled — the repo
# is authored on Windows where Xcode cannot run.

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test (iOS Simulator)
        run: |
          set -o pipefail
          xcodebuild \
            -project ClientVault.xcodeproj \
            -scheme ClientVault \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            clean test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: TestResults.xcresult
          if-no-files-found: ignore
