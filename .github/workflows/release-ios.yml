name: Release iOS (TestFlight)

# Tag a release to ship to TestFlight, e.g.:
#   git tag v0.1.1 && git push origin v0.1.1
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  testflight:
    name: Build & upload to TestFlight
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      # Apple requires apps to be built with the iOS 26 SDK (Xcode 26+).
      # macos-latest can default to an older Xcode, so select the newest
      # stable toolchain explicitly and log it for traceability.
      - name: Select latest stable Xcode (iOS 26 SDK)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show selected Xcode / SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks | grep -i iphoneos || true

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.44.1
          cache: true

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Generate code (Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode App Store Connect API key
        run: |
          mkdir -p ios/fastlane
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}" | openssl base64 -d -A > ios/fastlane/AuthKey.p8

      - name: Build Flutter iOS (no codesign)
        run: flutter build ios --release --no-codesign --build-number=${{ github.run_number }}

      - name: Build, sign & upload to TestFlight
        working-directory: ios
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          MATCH_GIT_BASIC_AUTHORIZATION: ${{ secrets.MATCH_GIT_BASIC_AUTHORIZATION }}
        run: bundle exec fastlane beta
