# ClientVault — XcodeGen project spec.
#
# The Xcode project (.xcodeproj) is GENERATED from this file, not committed.
# On a Mac (or CI):  brew install xcodegen && xcodegen generate && open ClientVault.xcodeproj
#
# Why XcodeGen: this repo is authored on Windows where Xcode cannot run. A
# declarative spec keeps the project reviewable in git and avoids hand-editing
# the fragile project.pbxproj format.

name: ClientVault

options:
  bundleIdPrefix: org.clientvault
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  defaultConfig: Debug

settings:
  base:
    MARKETING_VERSION: "0.22.1"         # ← user-facing app version (semver). Single source of truth.
                                        #    Continues the line past the Flutter app's 0.17.0 — App Store
                                        #    Connect rejects a version that isn't greater than a prior upload.
    CURRENT_PROJECT_VERSION: "24"       # ← build number; must exceed the highest previously uploaded build
                                        #    (the Flutter app reached 0.17.0+19) and increase every upload.
    SWIFT_VERSION: "5.10"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""                # provided by CI secret / local Secrets.xcconfig — never commit.
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: targeted
    GCC_TREAT_WARNINGS_AS_ERRORS: NO
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

# Third-party packages are added per phase. The vault phase introduces a vetted
# Argon2id implementation (e.g. swift-sodium).
packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  Sodium:
    url: https://github.com/jedisct1/swift-sodium
    from: "0.9.1"

targets:
  ClientVault:
    type: application
    platform: iOS
    sources:
      - path: ClientVault
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_NAME: ClientVault
        PRODUCT_BUNDLE_IDENTIFIER: org.clientvault.app   # MUST match App Store Connect.
        INFOPLIST_FILE: ClientVault/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClientVault/Resources/ClientVault.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"                       # iPhone-first (premium iPhone app).
        SUPPORTS_MACCATALYST: NO
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: Sodium
        product: Sodium

  ClientVaultTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ClientVaultTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.clientvault.app.tests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ClientVault

schemes:
  ClientVault:
    build:
      targets:
        ClientVault: all
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - ClientVaultTests
    archive:
      config: Release
